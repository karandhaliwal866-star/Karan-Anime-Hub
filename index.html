<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Anime Database</title>
    <style>
        :root {
            --bg: #0f1115;
            --card-bg: #1a1d24;
            --accent: #00ffcc;
            --text-white: #ffffff;
            --text-muted: #8a94a6;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 40px auto;
            display: flex;
            gap: 10px;
        }

        .search-container input {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #2e3440;
            background: #1a1d24;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .search-container input:focus {
            border-color: var(--accent);
        }

        .search-container button {
            padding: 0 25px;
            background: var(--accent);
            color: #0f1115;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-container button:hover {
            opacity: 0.9;
        }

        .anime-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .anime-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #232834;
            display: flex;
            flex-direction: column;
        }

        .poster-box {
            width: 100%;
            height: 380px;
            background: #111;
        }

        .poster-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-box {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .title {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            color: var(--text-white);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.8rem;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 12px;
        }

        .synopsis {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .loading {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.5rem;
            color: var(--text-muted);
            padding: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Global Anime Encyclopedia</h1>
        <p>Explore thousands of anime series directly from the world's largest database.</p>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search any anime in the world...">
            <button onclick="searchAnime()">Search</button>
        </div>
    </header>

    <div class="anime-grid" id="anime-display">
        <!-- JavaScript will automatically inject thousands of anime cards here -->
    </div>

    <script>
        // Automatically load the world's top popular anime when page opens
        window.onload = function() {
            fetchAnimeData('https://api.jikan.moe/v4/top/anime');
        };

        // Function to search for any specific anime
        function searchAnime() {
            const query = document.getElementById('search-input').value.trim();
            if(query === "") return;
            
            const searchUrl = `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&order_by=popularity`;
            fetchAnimeData(searchUrl);
        }

        // Fetch data from the live global database
        function fetchAnimeData(url) {
            const container = document.getElementById('anime-display');
            container.innerHTML = '<div class="loading">Summoning anime data...</div>';

            fetch(url)
                .then(response => response.json())
                .then(result => {
                    container.innerHTML = ''; // Clear loading screen
                    const animeList = result.data;

                    if(!animeList || animeList.length === 0) {
                        container.innerHTML = '<div class="loading">No anime found by that name!</div>';
                        return;
                    }

                    // Loop through the data and build a card for every anime
                    animeList.forEach(anime => {
                        const card = document.createElement('div');
                        card.className = 'anime-card';

                        const title = anime.title;
                        const image = anime.images.jpg.large_image_url;
                        const score = anime.score ? `★ ${anime.score}` : '★ N/A';
                        const type = anime.type || 'TV';
                        const synopsis = anime.synopsis || 'No description available for this title.';

                        card.innerHTML = `
                            <div class="poster-box">
                                <img src="${image}" alt="${title}" loading="lazy">
                            </div>
                            <div class="info-box">
                                <h3 class="title">${title}</h3>
                                <div class="meta">
                                    <span>${type}</span>
                                    <span>${score}</span>
                                </div>
                                <p class="synopsis">${synopsis}</p>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    container.innerHTML = '<div class="loading">Database connection busy. Try again in a few seconds!</div>';
                });
        }

        // Enable pressing "Enter" key to search
        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchAnime();
            }
        });
    </script>
</body>
</html>
