<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Movie Archive - Alphabetical Finder</title>
    <style>
        :root {
            --bg-color: #0a0c10;
            --card-bg: #121620;
            --accent-color: #ff3838;
            --text-main: #ffffff;
            --text-sub: #a0aec0;
            --border-color: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 15px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        header h1 span {
            color: var(--accent-color);
        }

        .controls-wrapper {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Combined Search and List Box */
        .search-box {
            flex: 1;
            display: flex;
            gap: 12px;
            background: #1a202c;
            padding: 8px;
            border-radius: 50px;
            border: 2px solid var(--border-color);
            transition: border-color 0.3s;
        }

        .search-box:focus-within {
            border-color: var(--accent-color);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        .search-box button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .search-box button:hover {
            opacity: 0.9;
        }

        /* Quick A-Z Trigger Button right next to search */
        .az-trigger-btn {
            background: #1a202c;
            color: var(--accent-color);
            border: 2px solid var(--border-color);
            border-radius: 50px;
            padding: 18px 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .az-trigger-btn:hover {
            border-color: var(--accent-color);
            background: #232d3f;
        }

        /* Alphabet Drawer Panel */
        .alphabet-panel {
            max-width: 680px;
            margin: 15px auto;
            background: #121620;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: none; /* Controlled by JS toggle */
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .alphabet-panel button {
            background: #1a202c;
            color: white;
            border: 1px solid var(--border-color);
            width: 38px;
            height: 38px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .alphabet-panel button:hover, .alphabet-panel button.active-letter {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        .gallery-title {
            max-width: 1200px;
            margin: 40px auto 20px auto;
            font-size: 1.6rem;
            color: var(--text-sub);
        }

        .poster-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #1a202c;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .movie-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-color);
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 145%;
            overflow: hidden;
            background-color: #000;
        }

        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .movie-card:hover .image-wrapper img {
            transform: scale(1.08);
        }

        .movie-details {
            padding: 15px;
        }

        .movie-name {
            font-size: 1.1rem;
            margin: 0 0 8px 0;
            font-weight: 600;
            line-height: 1.3;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .rating {
            color: #ffbc00;
            font-weight: bold;
        }

        .message {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.3rem;
            color: var(--text-sub);
            padding: 60px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Cinema<span>Anime</span></h1>
        <p>Search directly or explore alphabetically</p>
    </header>

    <div class="controls-wrapper">
        <!-- Search and list integration -->
        <div class="search-box">
            <input type="text" id="movie-search" list="anime-list" placeholder="Type name (e.g., Naruto, Dragon Ball)..." oninput="fetchSuggestions()">
            <datalist id="anime-list"></datalist>
            <button onclick="displayMoviePosters()">Search Movies</button>
        </div>
        
        <!-- The quick letter filter button positioned right next to it -->
        <button class="az-trigger-btn" onclick="toggleAlphabetPanel()">🔤 A - Z Finder</button>
    </div>

    <!-- Hidden letter grid that slides out -->
    <div class="alphabet-panel" id="letter-drawer"></div>

    <h2 class="gallery-title" id="display-status">Popular Feature Movies</h2>
    <div class="poster-grid" id="gallery-container"></div>

    <script>
        window.onload = function() {
            // Build the alphabetical buttons dynamically inside the panel
            const drawer = document.getElementById('letter-drawer');
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const btn = document.createElement('button');
                btn.innerText = letter;
                btn.onclick = () => filterByLetter(letter, btn);
                drawer.appendChild(btn);
            }
            // Load trending items as default homepage state
            loadGalleryData('https://api.jikan.moe/v4/anime?type=movie&order_by=score&sort=desc&limit=20');
        };

        function toggleAlphabetPanel() {
            const panel = document.getElementById('letter-drawer');
            panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        }

        // Triggered when clicking a specific letter
        function filterByLetter(letter, activeBtn) {
            // Highlight current selection
            document.querySelectorAll('.alphabet-panel button').forEach(b => b.classList.remove('active-letter'));
            activeBtn.classList.add('active-letter');
            
            document.getElementById('display-status').innerText = `Anime Movies Starting With: "${letter}"`;
            
            // API call filtering down exclusively to movies starting with our chosen letter symbol
            const targetUrl = `https://api.jikan.moe/v4/anime?letter=${letter}&type=movie&order_by=title&sort=asc`;
            loadGalleryData(targetUrl);
        }

        let debounceTimer;
        function fetchSuggestions() {
            clearTimeout(debounceTimer);
            const inputVal = document.getElementById('movie-search').value.trim();
            if (inputVal.length < 3) return;

            debounceTimer = setTimeout(() => {
                fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(inputVal)}&limit=8`)
                    .then(res => res.json())
                    .then(output => {
                        const dl = document.getElementById('anime-list');
                        dl.innerHTML = '';
                        if(output.data) {
                            output.data.forEach(item => {
                                const opt = document.createElement('option');
                                opt.value = item.title;
                                dl.appendChild(opt);
                            });
                        }
                    }).catch(e => console.log(e));
            }, 250);
        }

        function displayMoviePosters() {
            const animeQuery = document.getElementById('movie-search').value.trim();
            if(animeQuery === "") return;

            // Close alphabet drawer if active to focus on search text results
            document.getElementById('letter-drawer').style.display = 'none';
            document.getElementById('display-status').innerText = `All Movies for: "${animeQuery}"`;
            
            const targetApiUrl = `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(animeQuery)}&type=movie`;
            loadGalleryData(targetApiUrl);
        }

        function loadGalleryData(apiUrl) {
            const targetGrid = document.getElementById('gallery-container');
            targetGrid.innerHTML = '<div class="message">Gathering official movie poster artwork...</div>';

            fetch(apiUrl)
                .then(response => response.json())
                .then(payload => {
                    targetGrid.innerHTML = ''; 
                    const movies = payload.data;

                    if(!movies || movies.length === 0) {
                        targetGrid.innerHTML = '<div class="message">No theatrical movie matches recorded under this index classification.</div>';
                        return;
                    }

                    movies.forEach(movie => {
                        const movieCard = document.createElement('div');
                        movieCard.className = 'movie-card';

                        const name = movie.title;
                        const posterImg = movie.images.jpg.large_image_url;
                        const score = movie.score ? `★ ${movie.score}` : '★ Unrated';
                        const releaseYear = movie.year ? movie.year : 'Movie';

                        movieCard.innerHTML = `
                            <div class="image-wrapper">
                                <img src="${posterImg}" alt="${name}" loading="lazy">
                            </div>
                            <div class="movie-details">
                                <h3 class="movie-name" title="${name}">${name}</h3>
                                <div class="movie-meta">
                                    <span>Year: ${releaseYear}</span>
                                    <span class="rating">${score}</span>
                                </div>
                            </div>
                        `;
                        targetGrid.appendChild(movieCard);
                    });
                })
                .catch(err => {
                    console.error(err);
                    targetGrid.innerHTML = '<div class="message">Database rate-limited. Wait a second and click again!</div>';
                });
        }

        document.getElementById('movie-search').addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                displayMoviePosters();
            }
        });
    </script>
</body>
    </html>
